<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Викторины | ИБЧ</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/viktoryna.css">
  <link rel="icon" type="image/png" href="IBCH.png">
  <meta name="theme-color" content="#0E0E0E">
</head>
<body>

  <header class="header">
    <button id="themeBtn" class="theme-btn">🌙</button>
    <div class="container">
      <div class="logo">ИБЧ</div>
      <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="quiz.html" class="active">Викторины</a>
        <a href="wheel.html">Колесо фактов</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <h1>Викторины</h1>
        <p>Проверь свои знания и заработай XP.</p>
      </div>
    </section>

    <!-- Выбор режима викторины -->
    <section class="categories" id="quizModeSelector">
      <div class="container">
        <div class="category-grid">
          <button class="category-btn active" data-mode="millionaire">
            💰 Кто хочет стать миллионером?
            <small>15 вопросов</small>
          </button>
          <button class="category-btn" data-mode="timed">
            ⏱ На время
            <small>10 вопросов</small>
          </button>
          <button class="category-btn" data-mode="tricky">
            🤔 С подвохом
            <small>10 вопросов</small>
          </button>
        </div>
      </div>
    </section>

    <section class="quiz-container" id="quizContainer" style="display: none;">
      <div class="container">
        <div class="fact-card">
          <div id="quizInfo" class="quiz-info"></div>
          <h2 id="quizQuestion">Вопрос появится здесь</h2>
          <div id="quizAnswers" class="quiz-answers"></div>
          <button id="nextQuestionBtn" class="random-fact-btn" style="display: none;">Далее</button>
          <div id="quizResult" style="display: none;"></div>
        </div>
      </div>
    </section>

    <!-- Тост-уведомления -->
    <div id="resultToast" class="toast-hidden"></div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 ИБЧ</p>
    </div>
  </footer>
 
<script src="js/quiz.js"></script>
</body>
</html>
