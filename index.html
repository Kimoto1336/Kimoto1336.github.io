<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИБЧ — Истина или Бред Человечества</title>
    <link rel="stylesheet" href="./css/style.css">
<link rel="icon" type="image/png" href="IBCH.png">
<meta name="theme-color" content="#0E0E0E">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                ИБЧ
            </div>
            <nav class="nav">
                <a href="./index.html">Главная</a>
                <a href="./quiz.html">Викторины</a>
                 <a href="./wheel.html">Колесо фактов</a>
                <!-- <a href="./leaderboard.html">Лидеры</a>
                <a href="./profile.html">Профиль</a> -->
            </nav>
            <button id="themeBtn" class="theme-btn">
                🌙
            </button>
        </div>
    </header>

    <main>
        <!-- Секция заголовка -->
        <section class="hero">
            <div class="container">
                <h1>
                    Иногда бывает что?<br>
                    Истина или бред человеческий?
                </h1>
            </div>
        </section>

        <!-- Секция категорий (горизонтальные кнопки) -->
        <section class="categories">
            <button class="category-btn">Наука</button>
            <button class="category-btn">История</button>
            <button class="category-btn">Мемы</button>
            <button class="category-btn">Животные</button>
            <button class="category-btn">Игры</button>
            <button class="category-btn">18+</button>
        </section>

        <section class="fact-section">
            <div class="container">
                <div class="fact-card" id="factCard">
                    <!-- Звезда-подсказка -->
                    <div class="hint-star-wrapper" id="hintStarWrapper">
                        <button class="hint-star" id="hintStar" aria-label="Подсказка">★</button>
                    </div>
                    <h2 id="factTitle">ТЕКСТ ФАКТА</h2>
                    
                    <div class="actions">
                        <button class="action-btn true-btn" data-answer="true">ПРАВДА</button>
                        <button class="action-btn false-btn" data-answer="false">ЛОЖЬ</button>
                    </div>

                    <button class="random-fact-btn" id="randomFactBtn">Получить случайный факт</button>
                    <!-- Кнопки 
                    <div class="social-actions">
                        <button class="social-btn" id="likeBtn">
                            <span class="icon">❤️</span> Лайк
                        </button>
                        <button class="social-btn" id="favBtn">
                            <span class="icon">⭐</span> Избранное
                        </button>
                        <button class="social-btn" id="shareBtn">
                            <span class="icon">🔗</span> Поделиться
                        </button> -->
                    </div>
                </div>
            </div>
        </section>

    </main>

    <div id="resultToast" class="toast-hidden"></div>
    
    <!-- ========== МОДАЛЬНОЕ ОКНО ПОДСКАЗКИ ========== -->
    <div id="hintModal" class="hint-modal">
        <div class="hint-content">
            <button class="hint-close" id="hintClose">&times;</button>
            <h3> Аргумент</h3>
            <div class="hint-badge" id="hintBadge">Правда</div>
            <p id="hintText">Здесь будет объяснение факта.</p>
        </div>
    </div>

    <!-- ========== FOOTER ========== -->

    <!-- Контейнер для всплывающих анимаций результата (Правда/Ложь) -->
    <div id="resultToast" class="toast-hidden"></div>

    <footer class="footer">
        <div class="container footer-grid">
            <div>
                <h3><a href="https://github.com/Kimoto1336/Kimoto1336.github.io" target="_blank" style="color:#F0EDE8;">ИБЧ</a></h3>
                <p>Истина или Бред Человечества</p>
            </div>
            <div>
                <h3>Создатели</h3>
                <p><a href="https://github.com/aurumhell" target="_blank" style="color:#F0EDE8;">aurumhell</a></p>
                <p><a href="https://github.com/markizzzza" target="_blank" style="color:#F0EDE8;">Markizzzza</a></p>
                <p><a href="https://github.com/Kimoto1336" target="_blank" style="color:#F0EDE8;">Fjorchik</a></p>
            </div>
        </div>
    </footer>
    
    <!-- Модальное окно подтверждения возраста -->
<div id="ageModal" class="hint-modal">  <!-- используем те же классы, что у hintModal -->
    <div class="hint-content age-modal-content">
        <button class="hint-close" id="ageClose">&times;</button>
        <h3>🔞 Подтверждение возраста</h3>
        <p>Вам уже исполнилось 18 лет?</p>
        <div class="age-buttons">
            <button class="age-btn age-yes" id="ageYes">Да, мне есть 18</button>
            <button class="age-btn age-no" id="ageNo">Нет, мне нет 18</button>
        </div>
    </div>
</div>
    <script src="js/app.js"></script>
</body>
</html>
