<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИБЧ — Истина или Бред Человечества</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="logo">
                ИБЧ
            </div>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="quiz.html">Викторины</a>
                <a href="#">Факты</a>
                <a href="#">Лидеры</a>
                <a href="#">Профиль</a>
            </nav>
            <button id="themeBtn" class="theme-btn">
                🌙
            </button>
        </div>
    </header>

    <main>
        <!-- Секция заголовка -->
        <section class="hero">
            <div class="container">
                <h1>
                    Иногда бывает что?<br>
                    Истина или бред человеческий?
                </h1>
            </div>
        </section>

        <!-- Секция категорий (горизонтальные кнопки) -->
        <section class="categories">
            <button class="category-btn">Наука</button>
            <button class="category-btn">История</button>
            <button class="category-btn">Мемы</button>
            <button class="category-btn">Животные</button>
            <button class="category-btn">Игры</button>
            <button class="category-btn">18+</button>
        </section>

        <!-- Секция с карточкой факта -->
        <section class="fact-section">
            <div class="container">
                <div class="fact-card" id="factCard">
                    <h2 id="factTitle">ТЕКСТ ФАКТА</h2>
                    
                    <div class="tags">
                        <span>наука</span>
                        <span>история</span>
                        <span>человек</span>
                    </div>

                    <div class="actions">
                        <button class="action-btn true-btn" data-answer="true">ПРАВДА</button>
                        <button class="action-btn false-btn" data-answer="false">ЛОЖЬ</button>
                    </div>

                    <button class="random-fact-btn" id="randomFactBtn">Получить случайный факт</button>
                </div>
            </div>
        </section>

    </main>

    <!-- Контейнер для всплывающих анимаций результата (Правда/Ложь) -->
    <div id="resultToast" class="toast-hidden"></div>

    <footer class="footer">
        <div class="container footer-grid">
            <div>
                <h3>ИБЧ</h3>
                <p>Истина или Бред Человечества</p>
            </div>
            <div>
                <h3>Создатели</h3>
                <p>Учебный проект</p>
                <p>Frontend Developer</p>
                <p>Backend Developer</p>
            </div>
            <div>
                <h3>Технологии</h3>
                <p>HTML</p>
                <p>CSS</p>
                <p>JavaScript</p>
            </div>
        </div>
    </footer>

    <script src="./js/app.js"></script>
</body>
</html>
